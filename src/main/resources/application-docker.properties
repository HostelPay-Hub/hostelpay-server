# Spring Boot Application
spring.application.name=hostelpay-server
server.port=8080

# PostgreSQL Datasource (Docker)
spring.datasource.url=jdbc:postgresql://db:5432/hostelpay_dev
spring.datasource.username=hostelpay_user
spring.datasource.password=hostelpay_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL15Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Logging
logging.level.root=INFO
logging.level.com.hostelpay=INFO
