# Spring Boot Application
spring.application.name=hostelpay-server
server.port=${PORT:8080}

# PostgreSQL Datasource (Local Development)
spring.datasource.url=jdbc:postgresql://localhost:5432/hostelpay_dev
spring.datasource.username=postgres
spring.datasource.password=specter@2027
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Logging
logging.level.root=INFO
logging.level.com.hostelpay=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# JWT Configuration
jwt.secret=HostelPayHub-Super-Secret-JWT-Key-That-Is-At-Least-256-Bits-Long-For-HS256-2026
jwt.expiration=86400000
